<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>谷粒商城 | 账户登录</title>
    <script src="/static/login/JD_js/jquery-3.1.1.min.js" type="text/javascript"></script>
    <style>
        :root {
            --primary-red: #ff4757;
            --primary-hover: #ff6b81;
            --input-border: #e0e0e0;
            --text-main: #2f3542;
            --text-gray: #747d8c;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        body {
            background: var(--bg-gradient);
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
        }

        /* 登录卡片容器 - 增强阴影与圆角 */
        #sign {
            width: 400px;
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        #sign:hover {
            transform: translateY(-5px);
        }

        .si_top {
            margin-bottom: 30px;
            text-align: center;
        }

        .si_top span {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(to right, #2f3542, #747d8c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 错误提示 - 更加柔和显眼 */
        .error, .backend-error {
            background: #fff5f5;
            border-left: 4px solid var(--primary-red);
            color: var(--primary-red);
            padding: 12px 15px;
            font-size: 13px;
            margin-bottom: 20px;
            border-radius: 4px;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* 表单样式优化 */
        ul { list-style: none; padding: 0; margin: 0; }
        li { margin-bottom: 22px; position: relative; }

        .input-group { position: relative; }
        .input-group img {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            opacity: 0.4;
            transition: all 0.3s;
        }

        input {
            width: 100%;
            height: 50px;
            text-indent: 44px;
            border: 1.5px solid var(--input-border);
            border-radius: 8px;
            font-size: 14px;
            background-color: #fafafa;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--primary-red);
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(255, 71, 87, 0.1);
        }

        /* 输入框焦点时图标变色 */
        input:focus + img, .input-group:focus-within img {
            opacity: 1;
            filter: grayscale(0);
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: -10px;
            margin-bottom: 25px;
        }

        .form-footer a {
            color: var(--text-gray);
            font-size: 13px;
            text-decoration: none;
            transition: color 0.2s;
        }

        .form-footer a:hover { color: var(--primary-red); }

        .form-footer .reg-link {
            color: var(--primary-red);
            font-weight: 600;
        }

        /* 登录按钮 - 加入渐变与悬浮效果 */
        .btn2 {
            width: 100%;
            height: 50px;
            background: linear-gradient(45deg, var(--primary-red), #ff6b81);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
            transition: all 0.3s;
            letter-spacing: 4px;
        }

        .btn2:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4);
            filter: brightness(1.1);
        }

        .btn2:active { transform: translateY(0); }

        .copyright {
            text-align: center;
            margin-top: 40px;
            font-size: 12px;
            color: #a4b0be;
        }
    </style>
</head>
<body>

<div id="sign">
    <div class="si_top">
        <span>账户登录</span>
    </div>

    <div class="backend-error" th:if="${session.msg != null}">
        [[${session.msg}]]
    </div>
    <div class="backend-error" th:if="${errors != null && #maps.containsKey(errors, 'msg')}" th:text="${errors.msg}"></div>

    <div class="si_bom1">
        <div class="error" id="jsError" style="display: none;">
            请输入账户名和密码
        </div>

        <form action="/login" method="post">
            <ul>
                <li class="input-group">
                    <img src="/static/login/JD_img/user_03.png"/>
                    <input type="text" name="loginacct" id="loginacct" placeholder="邮箱/用户名/已验证手机" class="user" autocomplete="off"/>
                </li>
                <li class="input-group">
                    <img src="/static/login/JD_img/user_06.png"/>
                    <input type="password" name="password" id="password" placeholder="密码" class="password"/>
                </li>
            </ul>

            <div class="form-footer">
                <a href="#">忘记密码？</a>
                <a href="http://auth.gulimall.com/reg.html" class="reg-link">立即注册</a>
            </div>

            <button class="btn2" type="submit" id="submitBtn">登 录</button>
        </form>
    </div>

</div>

<script type="text/javascript">
    $(function() {
        const $submitBtn = $('#submitBtn');
        const $user = $('#loginacct');
        const $pass = $('#password');
        const $jsError = $('#jsError');

        $submitBtn.on('click', function() {
            if ($.trim($user.val()) === '' || $.trim($pass.val()) === '') {
                $jsError.hide().fadeIn(); // 重新触发动画
                $user.css('border-color', '#ff4757');
                $pass.css('border-color', '#ff4757');
                return false;
            }
        });

        $('input').on('focus', function() {
            $jsError.fadeOut();
            $(this).css('border-color', '#e0e0e0');
        });
    });
</script>

</body>
</html>
