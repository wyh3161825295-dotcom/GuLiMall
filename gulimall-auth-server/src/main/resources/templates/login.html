<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>谷粒商城 | 账户登录</title>
    <script src="/static/login/JD_js/jquery-3.1.1.min.js" type="text/javascript"></script>
    <style>
        :root { --primary-red: #e4393c; --input-border: #ddd; --text-gray: #666; }
        body {
            background: #f5f5f5;
            font-family: "Microsoft YaHei", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 登录卡片容器 */
        #sign {
            width: 380px;
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .si_top { border-bottom: 1px solid #eee; margin-bottom: 25px; padding-bottom: 15px; text-align: center; }
        .si_top span { font-size: 20px; font-weight: bold; color: #333; }

        /* 错误提示框 */
        .error, .backend-error {
            background: #ffebeb;
            border: 1px solid #facccb;
            color: var(--primary-red);
            padding: 10px;
            font-size: 13px;
            margin-bottom: 15px;
            border-radius: 4px;
        }

        /* 表单样式 */
        ul { list-style: none; padding: 0; margin: 0; }
        li { margin-bottom: 20px; position: relative; }

        .input-group { position: relative; }
        .input-group img { position: absolute; left: 12px; top: 12px; width: 20px; opacity: 0.5; }

        input {
            width: 100%;
            height: 45px;
            text-indent: 40px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--primary-red); outline: none; box-shadow: 0 0 5px rgba(228,57,60,0.1); }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: -10px;
            margin-bottom: 20px;
        }
        .form-footer a { color: #999; font-size: 12px; text-decoration: none; }
        .form-footer a:hover { color: var(--primary-red); }
        .form-footer .reg-link { color: var(--primary-red); font-weight: bold; }

        .btn2 {
            width: 100%;
            height: 48px;
            background: var(--primary-red);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn2:hover { background: #c81623; }

        .copyright { text-align: center; margin-top: 30px; font-size: 12px; color: #ccc; }
    </style>
</head>
<body>

<div id="sign">
    <div class="si_top">
        <span>账户登录</span>
        <div class="backend-error" th:if="${session.msg != null}">
            [[${session.msg}]]
        </div>
    </div>

    <div class="si_bom1">
        <div class="error" id="jsError" style="display: none;">
            请输入账户名和密码
        </div>

        <form action="/login" method="post">
            <div class="backend-error" th:if="${errors != null && #maps.containsKey(errors, 'msg')}" th:text="${errors.msg}"></div>

            <ul>
                <li class="input-group">
                    <img src="/static/login/JD_img/user_03.png" class="err_img1"/>
                    <input type="text" name="loginacct" id="loginacct" placeholder="邮箱/用户名/已验证手机" class="user"/>
                </li>
                <li class="input-group">
                    <img src="/static/login/JD_img/user_06.png" class="err_img2"/>
                    <input type="password" name="password" id="password" placeholder="密码" class="password"/>
                </li>
            </ul>

            <div class="form-footer">
                <a href="#">忘记密码</a>
                <a href="http://auth.gulimall.com/reg.html" class="reg-link">立即注册</a>
            </div>

            <button class="btn2" type="submit" id="submitBtn">登 &nbsp; 录</button>
        </form>
    </div>

    <div class="copyright">
        © 2026 谷粒商城 Gulimall.com
    </div>
</div>

<script type="text/javascript">
    $(function() {
        const $submitBtn = $('#submitBtn');
        const $user = $('#loginacct');
        const $pass = $('#password');
        const $jsError = $('#jsError');

        // 表单点击登录验证
        $submitBtn.on('click', function() {
            if ($.trim($user.val()) === '' || $.trim($pass.val()) === '') {
                $jsError.fadeIn();
                $user.css('border-color', '#e4393c');
                $pass.css('border-color', '#e4393c');
                return false;
            }
        });

        // 重新输入时清除错误状态
        $('input').on('focus', function() {
            $jsError.fadeOut();
            $(this).css('border-color', '#ddd');
        });
    });
</script>

</body>
</html>
